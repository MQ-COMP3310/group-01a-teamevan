{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block body %}
<div class="mx-auto">
  <h1 class="mt-3 text-center">Log in</h1>
</div>
<div class="form-group">
  <!-- {% csrf_token %} adds the CSRF protection token; the login POST is
       rejected without it. LoginView reads any ?next= value to send the user
       back to the page that required authentication. -->
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-success mb-3">Log in</button>
  </form>
  <p>Don't have an account? <a href="{% url 'signup' %}">Sign up</a>.</p>
</div>
{% endblock body %}
