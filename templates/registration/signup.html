{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block body %}
<div class="mx-auto">
  <h1 class="mt-3 text-center">Sign up</h1>
</div>
<div class="form-group">
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-success mb-3">Sign up</button>
  </form>
  <p>Already have an account? <a href="{% url 'login' %}">Log in</a>.</p>
</div>
{% endblock body %}
